<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="description" content="Interactive demo of E-Commerce Platform showcasing product catalog, shopping cart, and checkout flow. Full-stack portfolio project.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Store Demo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛒</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></noscript>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0b1120; color: #e2e8f0; min-height: 100vh; }
.back-link { display: block; padding: 12px 24px; color: #64748b; text-decoration: none; font-size: 14px; }
.back-link:hover { color: #94a3b8; }
.back-link i { margin-right: 6px; }

/* Navbar */
.navbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 32px; border-bottom: 1px solid #1e293b; background: #131c31; }
.nav-left { display: flex; align-items: center; gap: 36px; }
.nav-logo { font-size: 22px; font-weight: 700; color: #6366f1; }
.nav-logo i { margin-right: 8px; }
.nav-links { display: flex; gap: 24px; list-style: none; }
.nav-links a { color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 500; }
.nav-links a:hover, .nav-links a.active { color: #e2e8f0; }
.nav-right { display: flex; align-items: center; gap: 20px; }
.cart-btn { position: relative; background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; }
.cart-btn:hover { color: #e2e8f0; }
.cart-badge { position: absolute; top: -6px; right: -8px; background: #ef4444; color: #fff; font-size: 10px; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: none; align-items: center; justify-content: center; }
.user-icon { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; }

/* Hero */
.hero { background: linear-gradient(135deg, #1e1b4b, #0b1120, #1c1b2b); padding: 60px 32px; text-align: center; border-bottom: 1px solid #1e293b; }
.hero h1 { font-size: 36px; font-weight: 800; margin-bottom: 8px; }
.hero h1 span { color: #f59e0b; }
.hero p { color: #94a3b8; font-size: 16px; margin-bottom: 24px; }
.hero .shop-now { background: #6366f1; color: #fff; border: none; padding: 12px 32px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; }
.hero .shop-now:hover { background: #4f46e5; }

/* Categories */
.categories { display: flex; gap: 10px; padding: 20px 32px; flex-wrap: wrap; border-bottom: 1px solid #1e293b; }
.cat-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid #1e293b; background: transparent; color: #94a3b8; font-size: 14px; cursor: pointer; font-family: inherit; }
.cat-btn:hover { border-color: #6366f1; color: #e2e8f0; }
.cat-btn.active { background: #6366f1; border-color: #6366f1; color: #fff; }

/* Products */
.products { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 32px; max-width: 1100px; margin: 0 auto; }
.product-card { background: #131c31; border: 1px solid #1e293b; border-radius: 12px; overflow: hidden; }
.product-card:hover { border-color: #334155; }
.product-img { height: 160px; display: flex; align-items: center; justify-content: center; font-size: 48px; color: #e2e8f0; }
.product-body { padding: 16px; }
.product-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.product-price { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.price-current { font-size: 18px; font-weight: 700; color: #22c55e; }
.price-original { font-size: 14px; color: #64748b; text-decoration: line-through; }
.product-rating { font-size: 13px; color: #f59e0b; margin-bottom: 12px; }
.product-rating .rating-empty { color: #334155; }
.add-to-cart-btn { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #6366f1; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.add-to-cart-btn:hover { background: #4f46e5; }
.add-to-cart-btn.in-cart { background: #22c55e; }

/* Cart Sidebar */
.cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; }
.cart-overlay.active { display: block; }
.cart-sidebar { position: fixed; top: 0; right: -400px; width: 380px; max-width: 90vw; height: 100%; background: #131c31; border-left: 1px solid #1e293b; z-index: 600; transition: right 0.3s ease; display: flex; flex-direction: column; }
.cart-sidebar.open { right: 0; }
.cart-header { display: flex; align-items: center; justify-content: space-between; padding: 20px; border-bottom: 1px solid #1e293b; }
.cart-header h3 { font-size: 18px; }
.cart-close { background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; }
.cart-close:hover { color: #e2e8f0; }
.cart-items { flex: 1; overflow-y: auto; padding: 12px 20px; }
.cart-empty { text-align: center; color: #64748b; padding: 40px 0; font-size: 14px; }
.cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid #1e293b; }
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 14px; font-weight: 600; }
.cart-item-price { font-size: 13px; color: #22c55e; }
.cart-qty { display: flex; align-items: center; gap: 8px; }
.cart-qty button { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #1e293b; background: #0b1120; color: #e2e8f0; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.cart-qty button:hover { background: #1e293b; }
.cart-qty span { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }
.cart-item-remove { background: none; border: none; color: #475569; cursor: pointer; font-size: 14px; }
.cart-item-remove:hover { color: #ef4444; }
.cart-footer { padding: 20px; border-top: 1px solid #1e293b; }
.cart-total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.cart-checkout { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #6366f1; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit; }
.cart-checkout:hover { background: #4f46e5; }

@media (max-width: 768px) {
  .nav-links { display: none; }
  .products { grid-template-columns: repeat(2, 1fr); padding: 16px; gap: 12px; }
  .hero h1 { font-size: 26px; }
}
@media (max-width: 480px) {
  .products { grid-template-columns: 1fr; }
}
.skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-text { height: 14px; margin-bottom: 8px; width: 80%; }
.skeleton-title { height: 20px; margin-bottom: 12px; width: 50%; }
.skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; }
.empty-state { text-align: center; padding: 40px 20px; color: #64748b; }
.empty-state i { font-size: 48px; margin-bottom: 16px; display: block; color: #334155; }
.empty-state h3 { font-size: 18px; color: #94a3b8; margin-bottom: 8px; }
.empty-state p { font-size: 14px; color: #64748b; }
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: 10px; font-size: 14px; display: flex; align-items: center; gap: 8px; animation: slideIn .3s ease; min-width: 280px; max-width: 400px; }
.toast.success { background: #065f46; color: #6ee7b7; border: 1px solid rgba(110,231,183,.2); }
.toast.error { background: #7f1d1d; color: #fca5a5; border: 1px solid rgba(252,165,165,.2); }
.toast.info { background: #1e3a5f; color: #93c5fd; border: 1px solid rgba(147,197,253,.2); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.toast .close-btn { margin-left: auto; background: none; border: none; color: inherit; opacity: .5; cursor: pointer; font-size: 16px; padding: 0; }
</style>
</head>
<body>

<div class="toast-container" id="toast-container" aria-live="polite"></div>

<a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>

<nav class="navbar">
  <div class="nav-left">
    <div class="nav-logo"><i class="fas fa-store"></i>ShopEase</div>
    <ul class="nav-links">
      <li><a href="javascript:void(0)" class="active">Home</a></li>
      <li><a href="javascript:void(0)">Shop</a></li>
      <li><a href="javascript:void(0)">Cart</a></li>
    </ul>
  </div>
  <div class="nav-right">
    <button class="cart-btn" onclick="toggleCart()"><i class="fas fa-shopping-cart"></i><span class="cart-badge" id="cartBadge">0</span></button>
    <div class="user-icon"><i class="fas fa-user"></i></div>
  </div>
</nav>

<section class="hero">
  <h1>Summer Sale - Up to <span>50% Off</span></h1>
  <p>Grab the best deals on top brands before they're gone</p>
  <button class="shop-now" onclick="alert('Welcome to ShopEase! Browse our products below.');">Shop Now</button>
</section>

<div class="categories" id="categories">
  <button class="cat-btn active" data-cat="all">All</button>
  <button class="cat-btn" data-cat="Electronics">Electronics</button>
  <button class="cat-btn" data-cat="Clothing">Clothing</button>
  <button class="cat-btn" data-cat="Books">Books</button>
  <button class="cat-btn" data-cat="Home">Home</button>
</div>

<div class="products" id="products"></div>

<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3><i class="fas fa-shopping-cart"></i> Shopping Cart</h3>
    <button class="cart-close" onclick="toggleCart()"><i class="fas fa-times"></i></button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">Your cart is empty</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total"><span>Total</span><span id="cartTotal">$0.00</span></div>
    <button class="cart-checkout" onclick="checkout()">Checkout</button>
  </div>
</div>

<script>
const productsData = [
  { id: 1, name: 'Wireless Headphones', price: 79.99, originalPrice: null, category: 'Electronics', rating: 4.5, icon: 'fa-headphones', gradient: 'linear-gradient(135deg, #1e1b4b, #312e81)' },
  { id: 2, name: 'Denim Jacket', price: 129.99, originalPrice: null, category: 'Clothing', rating: 4.2, icon: 'fa-vest', gradient: 'linear-gradient(135deg, #1c1b2b, #374151)' },
  { id: 3, name: 'JavaScript Guide', price: 39.99, originalPrice: null, category: 'Books', rating: 4.8, icon: 'fa-book-open', gradient: 'linear-gradient(135deg, #1c1917, #292524)' },
  { id: 4, name: 'Desk Lamp', price: 49.99, originalPrice: 69.99, category: 'Home', rating: 4.0, icon: 'fa-lightbulb', gradient: 'linear-gradient(135deg, #1e293b, #334155)' },
  { id: 5, name: 'Smart Watch', price: 199.99, originalPrice: null, category: 'Electronics', rating: 4.6, icon: 'fa-clock', gradient: 'linear-gradient(135deg, #0f172a, #1e293b)' },
  { id: 6, name: 'Running Shoes', price: 89.99, originalPrice: 119.99, category: 'Clothing', rating: 4.3, icon: 'fa-shoe-prints', gradient: 'linear-gradient(135deg, #1c1b2b, #1e293b)' }
];

let cart = [];
let currentCategory = 'all';

function showSkeleton(container, type) {
  var html = '';
  if (type === 'card') {
    for (var i = 0; i < 3; i++) {
      html += '<div class="skeleton" style="padding:16px;margin-bottom:12px"><div class="skeleton-title"></div><div class="skeleton-text"></div><div class="skeleton-text" style="width:60%"></div></div>';
    }
  } else if (type === 'list') {
    for (var i = 0; i < 5; i++) {
      html += '<div style="display:flex;align-items:center;gap:12px;padding:12px 0"><div class="skeleton skeleton-avatar"></div><div style="flex:1"><div class="skeleton-title"></div><div class="skeleton-text" style="width:60%"></div></div></div>';
    }
  } else if (type === 'avatar') {
    html = '<div style="display:flex;align-items:center;gap:12px"><div class="skeleton skeleton-avatar"></div><div style="flex:1"><div class="skeleton-text" style="width:40%"></div></div></div>';
  } else {
    html = '<div class="skeleton" style="padding:16px"><div class="skeleton-title"></div><div class="skeleton-text"></div><div class="skeleton-text" style="width:60%"></div></div>';
  }
  container.innerHTML = html;
}

function hideSkeleton(container) {
  container.innerHTML = '';
}

function showEmptyState(container, icon, title, message) {
  container.innerHTML = '<div class="empty-state"><i class="' + icon + '"></i><h3>' + title + '</h3><p>' + message + '</p></div>';
}

function showToast(message, type, duration) {
  if (typeof type === 'boolean') type = type ? 'success' : 'error';
  type = type || 'info';
  duration = duration || 3000;
  var container = document.getElementById('toast-container');
  if (!container) return;
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = '<span>' + message + '</span><button class="close-btn" onclick="this.parentElement.remove()">&times;</button>';
  container.appendChild(toast);
  setTimeout(function() {
    if (toast.parentElement) toast.remove();
  }, duration);
}

function renderStars(rating) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    if (i <= Math.floor(rating)) html += '<i class="fas fa-star"></i>';
    else if (i - rating < 1 && i - rating > 0) html += '<i class="fas fa-star-half-alt"></i>';
    else html += '<i class="fas fa-star rating-empty"></i>';
  }
  return html + ' <span style="color:#94a3b8;font-size:12px;">' + rating + '</span>';
}

function renderProducts(category) {
  const container = document.getElementById('products');
  const filtered = category === 'all' ? productsData : productsData.filter(p => p.category === category);
  container.innerHTML = '';
  filtered.forEach(p => {
    const inCart = cart.some(c => c.id === p.id);
    const priceHtml = p.originalPrice ? `<span class="price-original">$${p.originalPrice.toFixed(2)}</span>` : '';
    const card = document.createElement('div');
    card.className = 'product-card';
    card.innerHTML = `
      <div class="product-img" style="background: ${p.gradient}"><i class="fas ${p.icon}"></i></div>
      <div class="product-body">
        <div class="product-name">${p.name}</div>
        <div class="product-price"><span class="price-current">$${p.price.toFixed(2)}</span>${priceHtml}</div>
        <div class="product-rating">${renderStars(p.rating)}</div>
        <button class="add-to-cart-btn ${inCart ? 'in-cart' : ''}" onclick="toggleCartItem(${p.id})">${inCart ? '<i class="fas fa-check"></i> In Cart' : '<i class="fas fa-shopping-cart"></i> Add to Cart'}</button>
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleCartItem(id) {
  const idx = cart.findIndex(c => c.id === id);
  if (idx >= 0) {
    cart.splice(idx, 1);
  } else {
    const product = productsData.find(p => p.id === id);
    if (product) cart.push({ ...product, quantity: 1 });
  }
  renderProducts(currentCategory);
  updateCartUI();
}

function updateCartUI() {
  const badge = document.getElementById('cartBadge');
  const count = cart.reduce((sum, c) => sum + c.quantity, 0);
  badge.textContent = count;
  badge.style.display = count > 0 ? 'flex' : 'none';

  const container = document.getElementById('cartItems');
  if (cart.length === 0) {
    container.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
    document.getElementById('cartTotal').textContent = '$0.00';
    return;
  }
  let html = '';
  let total = 0;
  cart.forEach(c => {
    const sub = c.price * c.quantity;
    total += sub;
    html += `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${c.name}</div>
          <div class="cart-item-price">$${c.price.toFixed(2)}</div>
        </div>
        <div class="cart-qty">
          <button onclick="changeQty(${c.id}, -1)">-</button>
          <span>${c.quantity}</span>
          <button onclick="changeQty(${c.id}, 1)">+</button>
        </div>
        <div style="font-weight:600;min-width:60px;text-align:right;">$${sub.toFixed(2)}</div>
        <button class="cart-item-remove" onclick="removeFromCart(${c.id})"><i class="fas fa-times"></i></button>
      </div>
    `;
  });
  container.innerHTML = html;
  document.getElementById('cartTotal').textContent = '$' + total.toFixed(2);
}

function changeQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.quantity += delta;
  if (item.quantity <= 0) {
    cart = cart.filter(c => c.id !== id);
  }
  renderProducts(currentCategory);
  updateCartUI();
}

function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  renderProducts(currentCategory);
  updateCartUI();
}

function toggleCart() {
  document.getElementById('cartSidebar').classList.toggle('open');
  document.getElementById('cartOverlay').classList.toggle('active');
}

function checkout() {
  const total = cart.reduce((sum, c) => sum + c.price * c.quantity, 0);
  if (total === 0) { alert('Your cart is empty!'); return; }
  const itemCount = cart.reduce((sum, c) => sum + c.quantity, 0);
  alert('Checkout - Total: $' + total.toFixed(2) + ' (' + itemCount + ' item' + (itemCount > 1 ? 's' : '') + ')\nThank you for shopping with ShopEase!');
}

document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCategory = btn.dataset.cat;
    renderProducts(currentCategory);
  });
});

renderProducts('all');
</script>
</body>
</html>
