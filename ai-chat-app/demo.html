<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="description" content="Interactive demo of AI Chat App featuring multi-session GPT-4 chat with real-time AI responses. React + Node.js + OpenAI portfolio project.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0b1120; color: #e2e8f0; min-height: 100vh; }
a { color: #60a5fa; text-decoration: none; }
a:hover { text-decoration: underline; }
.back-link { display: block; padding: 12px 24px; font-size: 14px; border-bottom: 1px solid #1e293b; background: #0b1120; }
.back-link i { margin-right: 6px; }

/* Login */
#login-screen { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 50px); }
.login-box { background: #131c31; border: 1px solid #1e293b; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
.login-box h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; text-align: center; }
.login-box p { color: #94a3b8; font-size: 14px; text-align: center; margin-bottom: 32px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: #94a3b8; margin-bottom: 6px; }
.form-group input { width: 100%; padding: 12px 16px; background: #0b1120; border: 1px solid #1e293b; border-radius: 10px; color: #e2e8f0; font-size: 14px; font-family: inherit; outline: none; transition: border-color .2s; }
.form-group input:focus { border-color: #3b82f6; }
.btn-primary { width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .2s; }
.btn-primary:hover { background: #2563eb; }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; }
.error-msg { color: #ef4444; font-size: 13px; text-align: center; margin-top: 12px; display: none; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

/* App Layout */
#app-screen { display: none; height: calc(100vh - 50px); }
.app-layout { display: flex; height: 100%; }
/* Sidebar */
.sidebar { width: 280px; background: #131c31; border-right: 1px solid #1e293b; display: flex; flex-direction: column; flex-shrink: 0; transition: transform .3s; }
.sidebar-header { padding: 16px; border-bottom: 1px solid #1e293b; }
.new-chat-btn { width: 100%; padding: 10px; background: #3b82f6; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background .2s; }
.new-chat-btn:hover { background: #2563eb; }
.chat-history { flex: 1; overflow-y: auto; padding: 8px; }
.chat-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background .15s; margin-bottom: 2px; }
.chat-item:hover { background: #1e293b; }
.chat-item.active { background: #1e293b; }
.chat-item .chat-name { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.chat-item .delete-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 13px; padding: 4px; border-radius: 4px; opacity: 0; transition: opacity .15s, color .15s; }
.chat-item:hover .delete-btn { opacity: 1; }
.chat-item .delete-btn:hover { color: #ef4444; }
/* Main */
.main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-header { padding: 16px 24px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 8px; background: #131c31; }
.chat-header h2 { font-size: 16px; font-weight: 600; }
.chat-header .edit-name { background: none; border: none; color: #64748b; cursor: pointer; font-size: 14px; padding: 4px; border-radius: 4px; transition: color .2s; }
.chat-header .edit-name:hover { color: #60a5fa; }
.chat-header input { background: #0b1120; border: 1px solid #1e293b; border-radius: 6px; color: #e2e8f0; font-size: 16px; font-weight: 600; padding: 4px 8px; font-family: inherit; outline: none; }
.messages-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
.msg { display: flex; gap: 12px; max-width: 80%; }
.msg.user { margin-left: auto; flex-direction: row-reverse; }
.msg .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.msg.ai .avatar { background: #3b82f6; }
.msg.user .avatar { background: #8b5cf6; }
.msg .bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
.msg.ai .bubble { background: #1e293b; border-top-left-radius: 4px; }
.msg.user .bubble { background: #3b82f6; border-top-right-radius: 4px; }
.msg .bubble .timestamp { font-size: 11px; color: #64748b; margin-top: 6px; display: block; }
.msg.user .bubble .timestamp { color: rgba(255,255,255,.6); }
.typing { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
.typing span { width: 6px; height: 6px; background: #64748b; border-radius: 50%; animation: typing 1.4s infinite both; }
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes typing { 0%,80%,100% { transform: scale(0.6); } 40% { transform: scale(1); } }
/* Input */
.input-bar { padding: 16px 24px; border-top: 1px solid #1e293b; background: #131c31; }
.input-wrap { display: flex; gap: 12px; background: #0b1120; border: 1px solid #1e293b; border-radius: 12px; padding: 4px; }
.input-wrap input { flex: 1; padding: 10px 16px; background: transparent; border: none; color: #e2e8f0; font-size: 14px; font-family: inherit; outline: none; }
.input-wrap button { width: 40px; height: 40px; background: #3b82f6; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; transition: background .2s; flex-shrink: 0; }
.input-wrap button:hover { background: #2563eb; }
/* Mobile toggle */
.sidebar-toggle { display: none; background: none; border: none; color: #e2e8f0; font-size: 20px; cursor: pointer; padding: 0 8px; }
.sidebar-overlay { display: none; }

@media (max-width: 768px) {
  .sidebar-toggle { display: block; }
  .sidebar { position: fixed; top: 50px; left: 0; bottom: 0; z-index: 100; transform: translateX(-100%); width: 280px; }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay { display: block; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 99; opacity: 0; pointer-events: none; transition: opacity .3s; }
  .sidebar-overlay.show { opacity: 1; pointer-events: all; }
  .msg { max-width: 90%; }
  .login-box { margin: 20px; padding: 24px; }
  .chat-header { padding: 12px 16px; }
  .messages-area { padding: 16px; }
  .input-bar { padding: 12px 16px; }
}
.skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-text { height: 14px; margin-bottom: 8px; width: 80%; }
.skeleton-title { height: 20px; margin-bottom: 12px; width: 50%; }
.skeleton-avatar { width: 40px; height: 40px; border-radius: 50%; }
.empty-state { text-align: center; padding: 40px 20px; color: #64748b; }
.empty-state i { font-size: 48px; margin-bottom: 16px; display: block; color: #334155; }
.empty-state h3 { font-size: 18px; color: #94a3b8; margin-bottom: 8px; }
.empty-state p { font-size: 14px; color: #64748b; }
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: 10px; font-size: 14px; display: flex; align-items: center; gap: 8px; animation: slideIn .3s ease; min-width: 280px; max-width: 400px; }
.toast.success { background: #065f46; color: #6ee7b7; border: 1px solid rgba(110,231,183,.2); }
.toast.error { background: #7f1d1d; color: #fca5a5; border: 1px solid rgba(252,165,165,.2); }
.toast.info { background: #1e3a5f; color: #93c5fd; border: 1px solid rgba(147,197,253,.2); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.toast .close-btn { margin-left: auto; background: none; border: none; color: inherit; opacity: .5; cursor: pointer; font-size: 16px; padding: 0; }
</style>
</head>
<body>

<div class="toast-container" id="toast-container" aria-live="polite"></div>

<a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-box">
    <h1><i class="fas fa-robot" style="color:#3b82f6;margin-right:8px;"></i>AI Chat</h1>
    <p>Sign in to start chatting</p>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password-input" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="signin-btn"><i class="fas fa-arrow-right-to-bracket" style="margin-right:8px;"></i>Sign In</button>
    <div class="error-msg" id="login-error" role="alert">Please enter email and password</div>
  </div>
</div>

<!-- App Screen -->
<div id="app-screen">
  <div class="app-layout">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="new-chat-btn"><i class="fas fa-plus"></i> New Chat</button>
      </div>
      <div class="chat-history" id="chat-history"></div>
    </div>
    <div class="main-area">
      <div class="chat-header">
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar"><i class="fas fa-bars"></i></button>
        <h2 id="current-chat-title">Chat</h2>
        <button class="edit-name" id="edit-name-btn" title="Rename chat"><i class="fas fa-pencil"></i></button>
        <label for="rename-input" class="sr-only">Rename chat</label>
        <input type="text" id="rename-input" style="display:none" aria-label="Rename chat">
      </div>
      <div class="messages-area" id="messages-area"></div>
      <div class="input-bar">
        <div class="input-wrap">
          <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
          <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const AI_AVATAR = '<i class="fas fa-robot"></i>';
const USER_AVATAR = '<i class="fas fa-user"></i>';
const AUTO_REPLIES = [
  "That's a great question!",
  "Let me help you with that...",
  "Here's what I would suggest...",
  "Interesting perspective! Let me elaborate.",
  "I think the best approach would be to...",
  "Great point! Have you considered...",
  "Let me break this down for you.",
  "That's something I can definitely help with.",
  "Here are a few options to consider...",
  "I'd recommend looking into this further.",
  "Absolutely! Here's what you need to know.",
  "Good thinking! Here's my take on it."
];

const SAMPLE_CHATS = [
  {
    name: "Project planning",
    messages: [
      { role: "ai", text: "Hello! I'd be happy to help you with project planning. What kind of project are you working on?" },
      { role: "user", text: "I'm starting a new web app and need help with the tech stack" },
      { role: "ai", text: "Great choice! For a modern web app, I'd recommend React with TypeScript for the frontend, Node.js with Express for the backend, and MongoDB for the database. Would you like me to elaborate on any of these?" },
      { role: "user", text: "Yes, tell me more about the React setup" },
      { role: "ai", text: "For React, I suggest using Vite as the build tool (it's much faster than Create React App), along with React Router for navigation and either Redux Toolkit or Zustand for state management. Tailwind CSS works great for styling too!" }
    ]
  },
  {
    name: "Code review help",
    messages: [
      { role: "ai", text: "I'm ready to help with code reviews. Share your code or tell me what you're reviewing!" },
      { role: "user", text: "I have a function that's 200 lines long and does too many things" },
      { role: "ai", text: "That's a common issue! I'd recommend the Single Responsibility Principle. Break it down into smaller, focused functions. Each function should do one thing well. Want me to help you refactor it?" }
    ]
  },
  {
    name: "React tips",
    messages: [
      { role: "ai", text: "Welcome! I can share React tips and best practices. What would you like to know?" },
      { role: "user", text: "What's the best way to manage state in React?" },
      { role: "ai", text: "It depends on your needs! For local component state, useState is perfect. For complex state logic, useReducer is great. For global state, consider Context API for simple cases or Zustand/Redux for more complex apps. The key is to keep state as local as possible!" },
      { role: "user", text: "What about performance optimization?" },
      { role: "ai", text: "Great question! Use React.memo for expensive components, useMemo for computed values, useCallback for stable function references, and always lazy-load routes with React.lazy. But remember: don't optimize prematurely — profile first!" }
    ]
  }
];

let chats = JSON.parse(JSON.stringify(SAMPLE_CHATS));
let currentChatIndex = 0;
let isProcessing = false;

function showSkeleton(container, type) {
  var html = '';
  if (type === 'card') {
    for (var i = 0; i < 3; i++) {
      html += '<div class="skeleton" style="padding:16px;margin-bottom:12px"><div class="skeleton-title"></div><div class="skeleton-text"></div><div class="skeleton-text" style="width:60%"></div></div>';
    }
  } else if (type === 'list') {
    for (var i = 0; i < 5; i++) {
      html += '<div style="display:flex;align-items:center;gap:12px;padding:12px 0"><div class="skeleton skeleton-avatar"></div><div style="flex:1"><div class="skeleton-title"></div><div class="skeleton-text" style="width:60%"></div></div></div>';
    }
  } else if (type === 'avatar') {
    html = '<div style="display:flex;align-items:center;gap:12px"><div class="skeleton skeleton-avatar"></div><div style="flex:1"><div class="skeleton-text" style="width:40%"></div></div></div>';
  } else {
    html = '<div class="skeleton" style="padding:16px"><div class="skeleton-title"></div><div class="skeleton-text"></div><div class="skeleton-text" style="width:60%"></div></div>';
  }
  container.innerHTML = html;
}

function hideSkeleton(container) {
  container.innerHTML = '';
}

function showEmptyState(container, icon, title, message) {
  container.innerHTML = '<div class="empty-state"><i class="' + icon + '"></i><h3>' + title + '</h3><p>' + message + '</p></div>';
}

function showToast(message, type, duration) {
  if (typeof type === 'boolean') type = type ? 'success' : 'error';
  type = type || 'info';
  duration = duration || 3000;
  var container = document.getElementById('toast-container');
  if (!container) return;
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = '<span>' + message + '</span><button class="close-btn" onclick="this.parentElement.remove()">&times;</button>';
  container.appendChild(toast);
  setTimeout(function() {
    if (toast.parentElement) toast.remove();
  }, duration);
}

function renderChatHistory() {
  const el = document.getElementById('chat-history');
  el.innerHTML = '';
  chats.forEach((chat, i) => {
    const div = document.createElement('div');
    div.className = 'chat-item' + (i === currentChatIndex ? ' active' : '');
    div.innerHTML = `<span class="chat-name"><i class="fas fa-comment" style="margin-right:8px;color:#64748b;font-size:12px;"></i>${chat.name}</span><button class="delete-btn" data-index="${i}"><i class="fas fa-times"></i></button>`;
    div.querySelector('.chat-name').addEventListener('click', () => switchChat(i));
    div.querySelector('.delete-btn').addEventListener('click', (e) => { e.stopPropagation(); deleteChat(i); });
    el.appendChild(div);
  });
}

function renderMessages() {
  const area = document.getElementById('messages-area');
  const chat = chats[currentChatIndex];
  area.innerHTML = '';
  chat.messages.forEach(m => {
    area.appendChild(createMessageElement(m.role, m.text));
  });
  area.scrollTop = area.scrollHeight;
  updateChatTitle();
}

function createMessageElement(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.innerHTML = role === 'ai' ? AI_AVATAR : USER_AVATAR;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  const ts = document.createElement('span');
  ts.className = 'timestamp';
  const now = new Date();
  ts.textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  bubble.appendChild(ts);
  div.appendChild(avatar);
  div.appendChild(bubble);
  return div;
}

function switchChat(index) {
  if (index === currentChatIndex) return;
  currentChatIndex = index;
  renderChatHistory();
  renderMessages();
  closeSidebar();
}

function deleteChat(index) {
  if (chats.length <= 1) {
    chats = [{
      name: "New Chat",
      messages: [{ role: "ai", text: "Hi! How can I help you today?" }]
    }];
    currentChatIndex = 0;
  } else {
    chats.splice(index, 1);
    if (currentChatIndex >= chats.length) currentChatIndex = chats.length - 1;
    else if (currentChatIndex === index && index > 0) currentChatIndex = index - 1;
    else if (currentChatIndex > index) currentChatIndex--;
  }
  renderChatHistory();
  renderMessages();
}

function newChat() {
  chats.push({
    name: "New Chat",
    messages: [{ role: "ai", text: "Hi! How can I help you today?" }]
  });
  currentChatIndex = chats.length - 1;
  renderChatHistory();
  renderMessages();
  closeSidebar();
}

function updateChatTitle() {
  document.getElementById('current-chat-title').textContent = chats[currentChatIndex].name;
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

function addUserMessage(text) {
  const chat = chats[currentChatIndex];
  chat.messages.push({ role: "user", text });
  const area = document.getElementById('messages-area');
  area.appendChild(createMessageElement('user', text));
  area.scrollTop = area.scrollHeight;
  
  // Show typing indicator
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg ai';
  typingDiv.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.innerHTML = AI_AVATAR;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  typingDiv.appendChild(avatar);
  typingDiv.appendChild(bubble);
  area.appendChild(typingDiv);
  area.scrollTop = area.scrollHeight;
  
  isProcessing = true;
  document.getElementById('msg-input').disabled = true;
  document.getElementById('send-btn').disabled = true;

  setTimeout(() => {
    const typingEl = document.getElementById('typing-indicator');
    if (typingEl) typingEl.remove();
    
    const reply = AUTO_REPLIES[Math.floor(Math.random() * AUTO_REPLIES.length)];
    chat.messages.push({ role: "ai", text: reply });
    area.appendChild(createMessageElement('ai', reply));
    area.scrollTop = area.scrollHeight;
    
    isProcessing = false;
    document.getElementById('msg-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }, 1000);
}

// Login
document.getElementById('signin-btn').addEventListener('click', () => {
  const email = document.getElementById('email-input').value.trim();
  const password = document.getElementById('password-input').value.trim();
  if (!email || !password) {
    const errEl = document.getElementById('login-error');
    errEl.textContent = 'Please enter email and password';
    errEl.style.display = 'block';
    return;
  }
  if (password.length < 4) {
    const errEl = document.getElementById('login-error');
    errEl.textContent = 'Password must be at least 4 characters';
    errEl.style.display = 'block';
    return;
  }
  const btn = document.getElementById('signin-btn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>Signing in...';
  document.getElementById('login-error').style.display = 'none';
  setTimeout(() => {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket" style="margin-right:8px;"></i>Sign In';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    renderChatHistory();
    renderMessages();
  }, 600);
});

document.getElementById('email-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('password-input').focus(); });
document.getElementById('password-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('signin-btn').click(); });

// Sidebar
document.getElementById('sidebar-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
});
document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);

// New Chat
document.getElementById('new-chat-btn').addEventListener('click', newChat);

// Send message
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || isProcessing) return;
  input.value = '';
  addUserMessage(text);
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

// Rename
const editBtn = document.getElementById('edit-name-btn');
const titleEl = document.getElementById('current-chat-title');
const renameInput = document.getElementById('rename-input');

editBtn.addEventListener('click', () => {
  titleEl.style.display = 'none';
  editBtn.style.display = 'none';
  renameInput.style.display = 'inline-block';
  renameInput.value = chats[currentChatIndex].name;
  renameInput.focus();
  renameInput.select();
});

renameInput.addEventListener('blur', finishRename);
renameInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') finishRename();
  if (e.key === 'Escape') cancelRename();
});

function cancelRename() {
  titleEl.style.display = 'inline';
  editBtn.style.display = 'inline-block';
  renameInput.style.display = 'none';
}

function finishRename() {
  const val = renameInput.value.trim();
  if (val) {
    chats[currentChatIndex].name = val;
    updateChatTitle();
    renderChatHistory();
  }
  titleEl.style.display = 'inline';
  editBtn.style.display = 'inline-block';
  renameInput.style.display = 'none';
}
</script>
