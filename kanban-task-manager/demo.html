<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta name="description" content="Interactive demo of Kanban Task Manager with drag-and-drop boards, columns, and cards. React + Node.js portfolio project.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
<title>Kanban Board Demo</title>
<meta property="og:title" content="Kanban Board Demo">
<meta property="og:description" content="Interactive demo of Kanban Task Manager with drag-and-drop boards, columns, and cards. React + Node.js portfolio project.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mostafaali.dev/kanban-task-manager/demo">
<meta property="og:image" content="https://mostafaali.dev/kanban-task-manager/og-image.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print" onload="this.media='all'">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0b1120; color: #e2e8f0; min-height: 100vh; }
.back-link { display: block; padding: 12px 24px; color: #64748b; text-decoration: none; font-size: 14px; }
.back-link:hover { color: #94a3b8; }
.back-link i { margin-right: 6px; }
.app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 1px solid #1e293b; }
.logo { font-size: 22px; font-weight: 700; color: #6366f1; }
.logo i { margin-right: 8px; }
.user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; }
.board-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 32px; }
.board-title { font-size: 24px; font-weight: 700; }
.board-title i { font-size: 16px; color: #64748b; margin-left: 10px; cursor: pointer; }
.board-title i:hover { color: #94a3b8; }
.add-column-btn { background: #1e293b; border: 1px dashed #334155; color: #94a3b8; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit; }
.add-column-btn:hover { background: #334155; color: #e2e8f0; }
.board { display: flex; gap: 20px; padding: 0 32px 32px; overflow-x: auto; min-height: calc(100vh - 160px); align-items: flex-start; }
.column { background: #131c31; border-radius: 12px; border: 1px solid #1e293b; min-width: 300px; max-width: 300px; flex-shrink: 0; display: flex; flex-direction: column; }
.column-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-radius: 12px 12px 0 0; font-weight: 600; font-size: 14px; }
.column-header-left { display: flex; align-items: center; gap: 8px; }
.column-header .count { background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 10px; font-size: 12px; }
.column-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 60px; }
.card { background: #0b1120; border: 1px solid #1e293b; border-radius: 8px; padding: 12px; position: relative; }
.card:hover { border-color: #334155; }
.card-delete { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 4px; border: none; background: transparent; color: #475569; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 12px; }
.card:hover .card-delete { display: flex; }
.card-delete:hover { background: #7f1d1d; color: #fca5a5; }
.card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.card-desc { font-size: 12px; color: #64748b; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { display: flex; align-items: center; justify-content: space-between; }
.card-labels { display: flex; gap: 4px; flex-wrap: wrap; }
.label { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; }
.label-bug { background: rgba(239,68,68,0.2); color: #fca5a5; }
.label-feature { background: rgba(168,85,247,0.2); color: #d8b4fe; }
.label-enhancement { background: rgba(34,197,94,0.2); color: #86efac; }
.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.due-date { font-size: 11px; color: #64748b; }
.due-date i { margin-right: 4px; }
.card-avatar { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #06b6d4); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
.add-card-btn { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px; margin: 4px 12px 12px; border-radius: 8px; border: 1px dashed #334155; background: transparent; color: #64748b; cursor: pointer; font-size: 13px; font-family: inherit; }
.add-card-btn:hover { background: #1e293b; color: #94a3b8; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; }
.modal-overlay.active { display: flex; }
.modal { background: #131c31; border: 1px solid #1e293b; border-radius: 16px; padding: 24px; width: 400px; max-width: 90vw; }
.modal h3 { font-size: 18px; margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 4px; }
.modal input, .modal textarea, .modal select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #1e293b; background: #0b1120; color: #e2e8f0; font-size: 14px; font-family: inherit; margin-bottom: 14px; outline: none; }
.modal input:focus, .modal textarea:focus, .modal select:focus { border-color: #6366f1; }
.modal textarea { resize: vertical; min-height: 60px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.modal-actions button { padding: 8px 20px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; font-family: inherit; }
.btn-cancel { background: #1e293b; color: #94a3b8; }
.btn-cancel:hover { background: #334155; }
.btn-add { background: #6366f1; color: #fff; }
.btn-add:hover { background: #4f46e5; }
</style>
</head>
<body>

<a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>

<div class="app-header">
  <div class="logo"><i class="fas fa-columns"></i>KanbanFlow</div>
  <div class="user-avatar">JD</div>
</div>

<div class="board-header">
  <div class="board-title">Sprint 24 <i class="fas fa-pencil-alt"></i></div>
  <button class="add-column-btn" onclick="alert('Add Column (demo)')"><i class="fas fa-plus"></i> Add Column</button>
</div>

<div class="board" id="board"></div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Add Card</h3>
    <label for="card-title-input">Title</label>
    <input type="text" id="card-title-input" placeholder="Enter card title">
    <label for="card-desc-input">Description</label>
    <textarea id="card-desc-input" placeholder="Enter description"></textarea>
    <label for="card-label-input">Label</label>
    <select id="card-label-input">
      <option value="feature">Feature</option>
      <option value="bug">Bug</option>
      <option value="enhancement">Enhancement</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-add" onclick="addCardFromModal()">Add</button>
    </div>
  </div>
</div>

<script>
const COLORS = {
  'To Do': '#f59e0b',
  'In Progress': '#3b82f6',
  'Done': '#22c55e'
};

const AVATARS = ['JD', 'MK', 'AL', 'SP', 'TR', 'CN'];
const LABELS_LIST = ['bug', 'feature', 'enhancement'];

let cardIdCounter = 10;

const initialData = [
  {
    title: 'To Do',
    cards: [
      { id: 1, title: 'Design user dashboard', desc: 'Create wireframes and mockups for the user dashboard page', label: 'feature', due: 'Jun 25', avatar: 'JD' },
      { id: 2, title: 'Fix login bug', desc: 'Users unable to log in with SSO credentials', label: 'bug', due: 'Jun 23', avatar: 'MK' }
    ]
  },
  {
    title: 'In Progress',
    cards: [
      { id: 3, title: 'Implement API routes', desc: 'Build REST endpoints for user management module', label: 'enhancement', due: 'Jun 28', avatar: 'AL' },
      { id: 4, title: 'Write unit tests', desc: 'Achieve 80% code coverage on core services', label: 'feature', due: 'Jun 30', avatar: 'SP' }
    ]
  },
  {
    title: 'Done',
    cards: [
      { id: 5, title: 'Setup CI/CD pipeline', desc: 'Configure GitHub Actions for automated deployment', label: 'enhancement', due: 'Jun 20', avatar: 'TR' },
      { id: 6, title: 'Create DB schema', desc: 'Design and migrate MongoDB database schema', label: 'feature', due: 'Jun 18', avatar: 'CN' }
    ]
  }
];

let columns = JSON.parse(JSON.stringify(initialData));
let activeColumnIndex = null;

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  columns.forEach((col, idx) => {
    const colEl = document.createElement('div');
    colEl.className = 'column';

    const color = COLORS[col.title] || '#6366f1';
    const header = document.createElement('div');
    header.className = 'column-header';
    header.style.background = color;
    header.innerHTML = `<div class="column-header-left"><span>${col.title}</span><span class="count">${col.cards.length}</span></div>`;

    const body = document.createElement('div');
    body.className = 'column-body';
    body.dataset.column = idx;

    col.cards.forEach(card => {
      const cardEl = createCardElement(card, idx);
      body.appendChild(cardEl);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'add-card-btn';
    addBtn.innerHTML = '<i class="fas fa-plus"></i> Add Card';
    addBtn.addEventListener('click', () => openModal(idx));

    colEl.appendChild(header);
    colEl.appendChild(body);
    colEl.appendChild(addBtn);
    board.appendChild(colEl);
  });
}

function createCardElement(card, colIdx) {
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.cardId = card.id;

  const labelClass = 'label-' + card.label;
  div.innerHTML = `
    <button class="card-delete" onclick="deleteCard(${colIdx}, ${card.id})"><i class="fas fa-times"></i></button>
    <div class="card-title">${card.title}</div>
    <div class="card-desc">${card.desc}</div>
    <div class="card-meta">
      <div class="card-labels"><span class="label ${labelClass}">${card.label}</span></div>
    </div>
    <div class="card-footer">
      <span class="due-date"><i class="far fa-calendar-alt"></i>${card.due}</span>
      <div class="card-avatar">${card.avatar}</div>
    </div>
  `;
  return div;
}

function openModal(colIdx) {
  activeColumnIndex = colIdx;
  document.getElementById('card-title-input').value = '';
  document.getElementById('card-desc-input').value = '';
  document.getElementById('card-label-input').value = 'feature';
  document.getElementById('modal').classList.add('active');
  document.getElementById('card-title-input').focus();
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  activeColumnIndex = null;
}

function addCardFromModal() {
  const title = document.getElementById('card-title-input').value.trim();
  const desc = document.getElementById('card-desc-input').value.trim();
  const label = document.getElementById('card-label-input').value;
  if (!title) { alert('Please enter a card title.'); return; }
  cardIdCounter++;
  const newCard = {
    id: cardIdCounter,
    title: title,
    desc: desc || 'No description',
    label: label,
    due: 'TBD',
    avatar: AVATARS[Math.floor(Math.random() * AVATARS.length)]
  };
  columns[activeColumnIndex].cards.push(newCard);
  renderBoard();
  closeModal();
}

function deleteCard(colIdx, cardId) {
  columns[colIdx].cards = columns[colIdx].cards.filter(c => c.id !== cardId);
  renderBoard();
}

document.getElementById('card-title-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addCardFromModal();
});

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) closeModal();
});

renderBoard();
</script>
</body>
</html>
